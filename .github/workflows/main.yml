name: Update Traffic Info

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Update Info
        run: |
          START_DATE=$(date -d "2026-04-22 20:00:00" +%s)
          NOW=$(date +%s)
          
          SECONDS_DIFF=$(( NOW - START_DATE ))
          [ $SECONDS_DIFF -lt 0 ] && SECONDS_DIFF=0
          HOURS_PASSED=$(( SECONDS_DIFF / 3600 ))
          
          # База 500 МБ + 25 МБ в час
          BASE_TRAFFIC=524288000
          HOURLY_ADD=$(( HOURS_PASSED * 26214400 ))
          TOTAL_USED=$(( BASE_TRAFFIC + HOURLY_ADD ))
          
          USED_DL=$TOTAL_USED
          USED_UL=$TOTAL_USED
          TOTAL=1125899906842624
          EXPIRE=3803752800
          
          # 1. Техническая строка (строго первая)
          INFO_LINE="#subscription-userinfo: upload=$USED_UL; download=$USED_DL; total=$TOTAL; expire=$EXPIRE"
          
          # 2. Твоя новая инфо-строка
          DESCRIPTION="WSVPN это VPN где тебя защищает котик от блокировок :3"
          
          # 3. Перезаписываем файл
          # Сначала пишем тех-инфо, потом описание, потом остальной конфиг (сервера)
          # Удаляем старые упоминания инфо и старое описание, если оно было
          grep -v "subscription-userinfo" NOTHINGV5 | grep -v "защищает котик" > body.tmp || touch body.tmp
          
          echo "$INFO_LINE" > NOTHINGV5
          echo "$DESCRIPTION" >> NOTHINGV5
          cat body.tmp >> NOTHINGV5
          rm body.tmp

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add NOTHINGV5
          git commit -m "Update info text: cat protector enabled" || exit 0
          git push
