      - name: Update Info
        run: |
          # 0. Задаем имя файла ОДИН раз, чтобы не путаться в регистре
          CONFIG_FILE="n0thingV5"

          # 1. Считаем время и трафик
          START_DATE=$(date -d "2026-04-22 20:00:00" +%s)
          NOW=$(date +%s)

          SECONDS_DIFF=$(( NOW - START_DATE ))
          [ $SECONDS_DIFF -lt 0 ] && SECONDS_DIFF=0
          HOURS_PASSED=$(( SECONDS_DIFF / 3600 ))

          BASE_TRAFFIC=524288000
          HOURLY_ADD=$(( HOURS_PASSED * 26214400 ))
          TOTAL_USED=$(( BASE_TRAFFIC + HOURLY_ADD ))

          USED_DL=$TOTAL_USED
          USED_UL=$TOTAL_USED
          TOTAL=1125899906842624
          EXPIRE=3803752800

          # 2. Новая техническая строка
          INFO_LINE="#subscription-userinfo: upload=$USED_UL; download=$USED_DL; total=$TOTAL; expire=$EXPIRE"

          # 3. НАСТОЯЩЕЕ УМНОЕ ОБНОВЛЕНИЕ:
          if [ -f "$CONFIG_FILE" ]; then
            # Убираем только старую строку с userinfo, сохраняем ВСЁ остальное во временный файл
            grep -v "subscription-userinfo:" "$CONFIG_FILE" > body.tmp
            # Записываем новую инфо-строку (перезаписываем файл >)
            echo "$INFO_LINE" > "$CONFIG_FILE"
            # Добавляем сохраненный остаток конфига (дописываем >>)
            cat body.tmp >> "$CONFIG_FILE"
            rm body.tmp
          else
            # Если файла вообще не было, просто создаем его с инфо-строкой
            echo "$INFO_LINE" > "$CONFIG_FILE"
          fi
