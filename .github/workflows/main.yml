name: Update Traffic Info

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Update Info
        run: |
          # 1. Точка отсчета
          START_DATE=$(date -d "2026-04-22 20:00:00" +%s)
          NOW=$(date +%s)
          
          # 2. Считаем часы. Если NOW меньше START, берем 0
          SECONDS_DIFF=$(( NOW - START_DATE ))
          if [ $SECONDS_DIFF -lt 0 ]; then SECONDS_DIFF=0; fi
          HOURS_PASSED=$(( SECONDS_DIFF / 3600 ))
          
          # 3. ТРАФИК: Стартовые 500 МБ (база) + 25 МБ за каждый прошедший час
          # 524288000 — это 500 МБ в байтах
          BASE_TRAFFIC=524288000
          HOURLY_ADD=$(( HOURS_PASSED * 26214400 ))
          
          TOTAL_USED=$(( BASE_TRAFFIC + HOURLY_ADD ))
          
          USED_DL=$TOTAL_USED
          USED_UL=$TOTAL_USED
          TOTAL=1125899906842624
          EXPIRE=3803752800
          
          # 4. Формируем строку
          INFO_LINE="#subscription-userinfo: upload=$USED_UL; download=$USED_DL; total=$TOTAL; expire=$EXPIRE"
          
          # 5. Перезапись (удаляем старую 1-ю строку и пишем новую сверху)
          [ -f NOTHINGV5 ] && sed -i '1d' NOTHINGV5
          echo -e "$INFO_LINE\n$(cat NOTHINGV5 2>/dev/null)" > NOTHINGV5

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add NOTHINGV5
          git commit -m "Fix: add base traffic to show activity" || exit 0
          git push
