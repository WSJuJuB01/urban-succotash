name: Update Traffic Info

on:
  schedule:
    - cron: '0 * * * *' # Обновление каждый час
  workflow_dispatch: # Кнопка ручного запуска

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Update Info
        run: |
          # 1. Точка отсчета: 22 апреля 2026, 20:00
          START_DATE=$(date -d "2026-04-22 20:00:00" +%s)
          NOW=$(date +%s)
          
          # 2. Считаем полные часы (чтобы увидеть результат сразу, а не через сутки)
          SECONDS_DIFF=$(( NOW - START_DATE ))
          [ $SECONDS_DIFF -lt 0 ] && SECONDS_DIFF=0
          HOURS_PASSED=$(( SECONDS_DIFF / 3600 ))
          
          # 3. Трафик (по 25 МБ за каждый час)
          # Т.к. прошло 2 часа, запишется по 50 МБ (52428800 байт)
          TRAFFIC_PER_HOUR=26214400
          CURRENT_TRAFFIC=$(( HOURS_PASSED * TRAFFIC_PER_HOUR ))
          
          USED_DL=$CURRENT_TRAFFIC
          USED_UL=$CURRENT_TRAFFIC
          
          # 4. Лимит 1 Петабайт (чтобы полоска в приложении была активна)
          TOTAL=1125899906842624
          
          # 5. Срок действия до 2090 года
          EXPIRE=3803752800
          
          # 6. Формируем строку и перезаписываем файл
          INFO_LINE="#subscription-userinfo: upload=$USED_UL; download=$USED_DL; total=$TOTAL; expire=$EXPIRE"
          
          # Сохраняем содержимое файла кроме первой строки (если оно там есть)
          if [ -f NOTHINGV5 ]; then
            sed -i '1d' NOTHINGV5
          fi
          
          # Записываем новую инфо-строку в самое начало
          echo -e "$INFO_LINE\n$(cat NOTHINGV5 2>/dev/null)" > NOTHINGV5

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add NOTHINGV5
          git commit -m "Auto-update NOTHINGV5 info" || exit 0
          git push
