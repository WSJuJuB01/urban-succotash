name: Update Traffic Info
on:
  schedule:
    - cron: '0 * * * *' # Будет запускаться каждый час
  workflow_dispatch: # Чтобы можно было запустить вручную

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Update Info
        run: |
          # Считаем дни с начала (например, с 1 июня 2024)
          START_DATE=$(date -d "2025-06-25" +%s)
          NOW=$(date +%s)
          DIFF=$(( (NOW - START_DATE) / 86400 ))
          
          # 0.5 ГБ в день (в байтах)
          USED=$(( DIFF * 536870912 ))
          TOTAL=99999999999999999999
          EXPIRE=3803752800
          
          # Заменяем первую строку в файле на новую с данными
          sed -i "1s|.*|#subscription-userinfo: upload=0; download=$USED; total=$TOTAL; expire=$EXPIRE|" NOTHINGV5.txt
          
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add NOTHINGV5
          git commit -m "Auto-update traffic info" || exit 0
          git push
